name: Update Keywords

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      source:
        description: "Data source"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - arxiv
          - openalex
          - s2
          - openreview
      venues:
        description: "Comma-separated venues, for example ICLR,NeurIPS,ACM MM"
        required: false
        default: ""
      years:
        description: "Comma-separated years, for example 2025,2024,2023"
        required: false
        default: ""
      limit:
        description: "Processing cap. Blank = 100000 in full mode."
        required: false
        default: ""
      crawl_mode:
        description: "auto/full/incremental"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - full
          - incremental
      full_crawl_target:
        description: "Structured-paper target before auto mode switches to incremental"
        required: false
        default: "200000"
      arxiv_max_results:
        description: "Maximum arXiv results. Blank = 50000 in full mode, 1000 otherwise."
        required: false
        default: ""
      arxiv_days:
        description: "arXiv lookback days"
        required: false
        default: "7"
      ccf_tier:
        description: "CCF tier filter for full crawl"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - A
          - B
          - C
      ccf_domain:
        description: "Optional CCF domain filter, for example AI, DB, SE, Security"
        required: false
        default: ""
      venue_offset:
        description: "Skip this many resolved venues for Actions batching"
        required: false
        default: ""
      venue_count:
        description: "Limit resolved venues for Actions batching"
        required: false
        default: ""
      export_only:
        description: "Export/deploy static site without crawling"
        required: false
        default: false
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 10

      - name: Create required directories
        run: |
          mkdir -p data output/figures output/reports
          touch data/.gitkeep output/figures/.gitkeep output/reports/.gitkeep

      - name: Verify environment
        run: |
          python --version
          pip --version
          python src/main.py --list-ccf-venues | wc -l

      - name: Run update pipeline
        if: ${{ github.event.inputs.export_only != 'true' }}
        env:
          OPENREVIEW_USERNAME: ${{ secrets.OPENREVIEW_USERNAME }}
          OPENREVIEW_PASSWORD: ${{ secrets.OPENREVIEW_PASSWORD }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          PYTHONUNBUFFERED: "1"
        timeout-minutes: 320
        run: |
          set -euo pipefail

          CRAWL_MODE="${{ github.event.inputs.crawl_mode }}"
          if [ -z "$CRAWL_MODE" ]; then
            CRAWL_MODE="auto"
          fi

          FULL_CRAWL_TARGET="${{ github.event.inputs.full_crawl_target }}"
          if [ -z "$FULL_CRAWL_TARGET" ]; then
            FULL_CRAWL_TARGET="200000"
          fi

          CURRENT_PAPER_COUNT=$(python - <<'PY'
          import sys
          sys.path.insert(0, "src")
          try:
              from database import get_repository
              print(get_repository().get_paper_count())
          except Exception:
              print(0)
          PY
          )

          RUN_FULL_CRAWL="false"
          if [ "$CRAWL_MODE" = "full" ]; then
            RUN_FULL_CRAWL="true"
          elif [ "$CRAWL_MODE" = "auto" ] && [ "${CURRENT_PAPER_COUNT:-0}" -lt "$FULL_CRAWL_TARGET" ]; then
            RUN_FULL_CRAWL="true"
          fi

          echo "Current structured papers: ${CURRENT_PAPER_COUNT:-0}"
          echo "Crawl mode: $CRAWL_MODE"
          echo "Full crawl target: $FULL_CRAWL_TARGET"
          echo "Run full crawl: $RUN_FULL_CRAWL"

          CMD=(python src/main.py)

          SOURCE="${{ github.event.inputs.source }}"
          if [ -z "$SOURCE" ]; then
            SOURCE="all"
          fi
          CMD+=(--source "$SOURCE")

          ARXIV_DAYS="${{ github.event.inputs.arxiv_days }}"
          if [ "$RUN_FULL_CRAWL" = "true" ]; then
            if [ -z "$ARXIV_DAYS" ] || [ "$ARXIV_DAYS" -lt 3650 ]; then
              ARXIV_DAYS="3650"
            fi
            CMD+=(--full-crawl)
          elif [ -z "$ARXIV_DAYS" ]; then
            ARXIV_DAYS="7"
          fi
          CMD+=(--arxiv-days "$ARXIV_DAYS")

          ARXIV_MAX_RESULTS="${{ github.event.inputs.arxiv_max_results }}"
          if [ -z "$ARXIV_MAX_RESULTS" ]; then
            if [ "$RUN_FULL_CRAWL" = "true" ]; then
              ARXIV_MAX_RESULTS="50000"
            else
              ARXIV_MAX_RESULTS="1000"
            fi
          fi
          CMD+=(--arxiv-max-results "$ARXIV_MAX_RESULTS")

          if [ -n "${{ github.event.inputs.venues }}" ]; then
            CMD+=(--venue)
            IFS="," read -ra VENUE_ARRAY <<< "${{ github.event.inputs.venues }}"
            for venue in "${VENUE_ARRAY[@]}"; do
              venue="$(echo "$venue" | xargs)"
              if [ -n "$venue" ]; then
                CMD+=("$venue")
              fi
            done
          fi

          if [ -n "${{ github.event.inputs.years }}" ]; then
            CMD+=(--year)
            IFS="," read -ra YEAR_ARRAY <<< "${{ github.event.inputs.years }}"
            for year in "${YEAR_ARRAY[@]}"; do
              year="$(echo "$year" | xargs)"
              if [ -n "$year" ]; then
                CMD+=("$year")
              fi
            done
          fi

          CCF_TIER="${{ github.event.inputs.ccf_tier }}"
          if [ -n "$CCF_TIER" ] && [ "$CCF_TIER" != "all" ]; then
            CMD+=(--ccf-tier "$CCF_TIER")
          fi

          CCF_DOMAIN="${{ github.event.inputs.ccf_domain }}"
          if [ -n "$CCF_DOMAIN" ]; then
            CMD+=(--ccf-domain "$CCF_DOMAIN")
          fi

          VENUE_OFFSET="${{ github.event.inputs.venue_offset }}"
          if [ -n "$VENUE_OFFSET" ]; then
            CMD+=(--venue-offset "$VENUE_OFFSET")
          fi

          VENUE_COUNT="${{ github.event.inputs.venue_count }}"
          if [ -n "$VENUE_COUNT" ]; then
            CMD+=(--venue-count "$VENUE_COUNT")
          fi

          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ] && [ "$RUN_FULL_CRAWL" = "true" ]; then
            LIMIT="100000"
          fi
          if [ -n "$LIMIT" ]; then
            CMD+=(--limit "$LIMIT")
          fi

          printf "Running:"
          printf " %q" "${CMD[@]}"
          echo
          "${CMD[@]}"

      - name: Export static site
        timeout-minutes: 20
        run: |
          set -euo pipefail
          python src/tools/export_static_site.py --output-dir docs --top-keywords 300
          find docs/data -type f -name "*.json" | head -20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate summary
        if: always()
        run: |
          echo "Pipeline Summary"
          if [ -f "data/keywords.db" ]; then
            du -h data/keywords.db
            python - <<'PY'
          import sys
          sys.path.insert(0, "src")
          try:
              from database import get_repository
              print("Total papers:", get_repository().get_paper_count())
          except Exception as exc:
              print("Total papers: N/A", exc)
          PY
          else
            echo "Database not found"
          fi

      - name: Commit and push generated site
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/.gitkeep data/registry/ output/ docs/

          if git diff --staged --quiet; then
            echo "No generated site changes to commit"
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          PAPER_COUNT=$(python - <<'PY' 2>/dev/null || echo "N/A"
          import sys
          sys.path.insert(0, "src")
          try:
              from database import get_repository
              print(get_repository().get_paper_count())
          except Exception:
              print("N/A")
          PY
          )

          git commit -m "chore: auto-update DeepTrender data [$DATE]" \
                     -m "Total papers: $PAPER_COUNT" \
                     -m "Generated by GitHub Actions"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deeptrender-data-${{ github.run_number }}
          path: |
            data/keywords.db
            output/reports/
            output/figures/
            docs/
          retention-days: 30
          if-no-files-found: warn

      - name: Create job summary
        if: always()
        run: |
          echo "## DeepTrender Update Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date**: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger**: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "data/keywords.db" ]; then
            DB_SIZE=$(du -h data/keywords.db | cut -f1)
            echo "- Database size: \`$DB_SIZE\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Job status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
