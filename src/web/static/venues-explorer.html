<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Explorer - DeepTrender</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-text">DeepTrender</span>
        </div>
        <div class="nav-links">
            <a href="./index.html" class="nav-link">Home</a>
            <a href="./venue.html" class="nav-link">Venue Analysis</a>
            <a href="./trends.html" class="nav-link">Trend Tracking</a>
            <a href="./comparison.html" class="nav-link">Venue Comparison</a>
            <a href="./arxiv.html" class="nav-link">arXiv Trends</a>
            <a href="./venues-explorer.html" class="nav-link active">Venue Explorer</a>
        </div>
    </nav>

    <main class="container">
        <section class="page-header">
            <h1>Venue Explorer</h1>
            <p>Browse discovered AI venues by domain and tier.</p>
        </section>
        <section class="venues-section">
            <div class="venues-table" id="venues-table">
                <p class="loading">Loading venues...</p>
            </div>
        </section>
    </main>

    <script>
        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
            }[char]));
        }

        async function loadVenues() {
            const container = document.getElementById("venues-table");
            try {
                const response = await fetch("./data/venues/venues_index.json");
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const venues = await response.json();
                if (!venues.length) {
                    container.innerHTML = '<p class="no-data">No venue data available.</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="venues-grid">
                        ${venues.map((venue) => `
                            <div class="venue-card">
                                <div class="venue-card-header">
                                    <span class="venue-name">${escapeHtml(venue.name)}</span>
                                    <span class="venue-count">${Number(venue.paper_count || 0).toLocaleString()} papers</span>
                                </div>
                                <div class="venue-meta">
                                    <span>${escapeHtml(venue.full_name || venue.name)}</span>
                                    <span>${escapeHtml(venue.domain || "General")} / ${escapeHtml(venue.tier || "N/A")}</span>
                                </div>
                                <div class="venue-keywords">
                                    ${(venue.top_keywords || []).slice(0, 6).map((item) => (
                                        `<span class="keyword-tag">${escapeHtml(item.keyword)}</span>`
                                    )).join("")}
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `;
            } catch (error) {
                console.error("Failed to load static venue data", error);
                container.innerHTML = '<p class="no-data">No static venue data available.</p>';
            }
        }

        document.addEventListener("DOMContentLoaded", loadVenues);
    </script>
</body>
</html>
